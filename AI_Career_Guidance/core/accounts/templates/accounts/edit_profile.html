{% extends 'accounts/base.html' %}
{% block content %}

<!-- Background -->
<div class="min-h-screen bg-gradient-to-br from-[#141e30] to-[#243b55] flex items-center justify-center px-4">

  <!-- Card -->
  <div class="w-full max-w-2xl bg-white/15 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl p-8 text-white">

    <!-- Header -->
    <div class="text-center mb-8">
      <h2 class="text-4xl font-extrabold tracking-wide">
        ✨ Update Your Profile
      </h2>
      <p class="text-white/70 mt-2">
        Improve your AI career recommendations
      </p>
    </div>

    <!-- Form -->
    <form method="POST" enctype="multipart/form-data" class="space-y-6">
      {% csrf_token %}

      <!-- Interest -->
      <div>
        <label class="block mb-2 font-semibold text-cyan-300">
          🎯 Primary Interest
        </label>
        <input
          name="interest"
          value="{{ profile.interest }}"
          placeholder="e.g. Data Science, Web Development"
          class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 focus:outline-none focus:ring-2 focus:ring-cyan-400 text-white placeholder-white/60 transition"
        >
      </div>

      <!-- Skills -->
      <div>
        <label class="block mb-3 font-semibold text-cyan-300">
          🛠 Select Your Skills
        </label>

        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
          {% for skill in skills %}
            <label class="flex items-center gap-2 bg-white/20 border border-white/30 px-3 py-2 rounded-lg cursor-pointer hover:bg-cyan-400/20 transition">
              <input type="checkbox"
                     name="skills"
                     value="{{ skill.id }}"
                     class="accent-cyan-400"
                     {% if skill in profile.skills.all %}checked{% endif %}>
              <span class="text-sm">{{ skill.name }}</span>
            </label>
          {% endfor %}
        </div>
      </div>

      <!-- Profile Picture -->
      <div>
        <label class="block mb-2 font-semibold text-cyan-300">
          📸 Profile Picture
        </label>

        <div class="flex items-center gap-4">
          <label class="cursor-pointer bg-white/20 border border-white/30 px-4 py-3 rounded-lg hover:bg-cyan-400/20 transition">
            Upload Image
            <input type="file" name="profile_picture" class="hidden">
          </label>

          <span class="text-sm text-white/60">
            Optional • JPG / PNG
          </span>
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex gap-4 pt-6">
        <button
          type="submit"
          class="w-full bg-cyan-400 hover:bg-cyan-300 text-gray-900 font-bold py-3 rounded-xl transition duration-300 shadow-lg">
          💾 Save Profile
        </button>

        <a href="{% url 'dashboard' %}"
           class="w-full text-center bg-white/20 hover:bg-white/30 border border-white/30 py-3 rounded-xl transition">
          ↩ Cancel
        </a>
      </div>

    </form>

  </div>
</div>

{% endblock %}
