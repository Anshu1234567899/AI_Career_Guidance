<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex">


  <!-- SIDEBAR -->
  <aside class="w-64 bg-gray-800 p-6 space-y-4">
    <h2 class="text-2xl font-bold text-cyan-400">Admin Panel</h2>

    

    <a href="{% url 'home' %}" class="block hover:text-cyan-300">🏠 Home</a>
    <a href="{% url 'admin_dashboard' %}" class="block hover:text-cyan-300">📊 Dashboard</a>
    <a href="{% url 'admin_users' %}" class="block hover:text-cyan-300">👥 Users</a>
    <a href="{% url 'admin_careers' %}" class="block hover:text-cyan-300">🎯 Careers</a>
    <a href="{% url 'admin_skills' %}" class="block hover:text-cyan-300">🧠 Skills</a>
    <a href="{% url 'admin_quiz_list' %}" class="block hover:text-cyan-300">🧠 Quiz</a>
    <a href="{% url 'logout' %}" class="block text-red-400">Logout</a>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 p-8">

    <!-- 🔔 DJANGO MESSAGES START -->
    {% if messages %}
      <div class="space-y-3 mb-6">
        {% for message in messages %}
          <div class="
            px-4 py-3 rounded-lg font-semibold
            {% if message.tags == 'success' %} bg-green-600 {% endif %}
            {% if message.tags == 'error' %} bg-red-600 {% endif %}
            {% if message.tags == 'warning' %} bg-yellow-500 text-black {% endif %}
          ">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
    <!-- 🔔 DJANGO MESSAGES END -->

    {% block content %}{% endblock %}
  </main>

</body>
</html>
