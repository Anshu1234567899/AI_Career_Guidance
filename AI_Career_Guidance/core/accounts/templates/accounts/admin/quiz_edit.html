{% extends 'accounts/admin/dashboard.html' %}

{% block content %}
<div class="max-w-3xl mx-auto p-6 bg-gray-800 rounded-lg text-white mt-6">
    <h2 class="text-2xl font-bold text-cyan-400 mb-4">Edit Career Quiz Question 🧪</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Question -->
        <div class="mb-4">
            <label class="block mb-1 font-semibold">Question</label>
            <input type="text" name="question" class="w-full p-2 rounded bg-gray-700" value="{{ question.question }}" required>
        </div>

        <!-- Options Loop -->
        {% for opt in options %}
        <div class="mb-2">
            <label class="block mb-1">Option {{ forloop.counter }}</label>
            <input type="text" name="option{{ forloop.counter }}_text" value="{{ opt.option_text }}" class="w-full p-2 rounded bg-gray-700" required>
            <input type="number" name="option{{ forloop.counter }}_score" value="{{ opt.score }}" class="w-full p-2 rounded bg-gray-700 mt-1" required>
        </div>
        {% endfor %}

        <button type="submit" class="bg-cyan-500 px-6 py-2 rounded hover:bg-cyan-600">Save Changes</button>
        <a href="{% url 'admin_quiz_list' %}" class="ml-4 bg-gray-600 px-4 py-2 rounded hover:bg-gray-700">Cancel</a>
    </form>
</div>
{% endblock %}
